name: Fetch intelligence feed

on:
  schedule:
    # 14:00 UTC = 07:00 PDT (most of the year) / 06:00 PST (Nov–Mar).
    # GitHub Actions ignores daylight saving, so the local time shifts by one
    # hour twice a year. Acceptable for a daily refresh.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-feed
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run fetcher
        run: python scripts/fetch.py

      - name: Commit & push if changed
        run: |
          git config user.name  "cos-dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "data: refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
